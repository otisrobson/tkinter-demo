name: Build macOS App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install universal2 Python
        run: |
          curl -L -o python.pkg "https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg"
          sudo installer -pkg python.pkg -target /
          /usr/local/bin/python3.12 -m pip install pyinstaller

      - name: Build universal .app bundle
        run: |
          /usr/local/bin/python3.12 -m PyInstaller \
            --windowed \
            --name "MyFirstGUI" \
            --target-arch universal2 \
            tkinter_demo.py

      - name: Verify architecture
        run: |
          file dist/MyFirstGUI.app/Contents/MacOS/MyFirstGUI
          lipo -archs dist/MyFirstGUI.app/Contents/MacOS/MyFirstGUI

      - name: Test x86_64 via Rosetta
        run: |
          arch -x86_64 dist/MyFirstGUI.app/Contents/MacOS/MyFirstGUI &
          sleep 3 && kill $!

      - name: Create DMG
        run: |
          hdiutil create -volname "MyFirstGUI" -srcfolder dist/MyFirstGUI.app \
            -ov -format UDZO dist/MyFirstGUI.dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MyFirstGUI.dmg
